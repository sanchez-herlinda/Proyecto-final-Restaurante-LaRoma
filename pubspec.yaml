name: la_roma
description: Aplicación móvil para el restaurante La ROMA.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase (Versiones actualizadas, Cero Analíticas)
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.1

  # Estado y Arquitectura (MVVM)
  provider: ^6.1.2

  # UI, Estética y Utilidades
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1        # Para animaciones de carga elegantes
  cached_network_image: ^3.4.1   # Para cargar y cachear imágenes de tu GitHub
  intl: ^0.19.0                  # Para formatear precios (ej. $50.00)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # No declaramos la carpeta assets/images porque todo viene de GitHub